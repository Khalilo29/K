name: Global Visionary Engine
on:
  schedule:
    - cron: '*/5 * * * *' # النبض السريع: كل 5 دقائق 🚀
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install pyTelegramBotAPI feedparser beautifulsoup4 deep-translator
      - name: Run Engine
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python bot.py
      - name: Auto-Save Memory
        run: |
          git config --global user.name "Visionary-AI-Core"
          git config --global user.email "ai@visionary.com"
          git add published_urls.txt || echo "No changes"
          git commit -m "Memory Update [skip ci]" || echo "No changes"
          git push
