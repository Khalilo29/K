name: Visionary X Bot
on:
  schedule:
    - cron: '0 */2 * * *' # يعمل كل ساعتين تلقائياً
  workflow_dispatch: # للتشغيل اليدوي

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install pyTelegramBotAPI feedparser beautifulsoup4

      - name: Run Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python bot.py

      - name: Save memory
        run: |
          git config --global user.name "Visionary Bot"
          git config --global user.email "bot@visionary.com"
          git add published_urls.txt
          git commit -m "Update published news history [skip ci]" || echo "No changes to commit"
          git push
