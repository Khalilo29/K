name: Continuous-Service-24-7

on:
  schedule:
    - cron: '0 */4 * * *' # إعادة تشغيل إجبارية كل 4 ساعات لضمان النشاط الدائم
  push:
    branches: [ main ]
  workflow_dispatch: # يسمح لك بالتشغيل اليدوي للطوارئ

jobs:
  execute-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 سحب الكود
        uses: actions/checkout@v3

      - name: 🐍 إعداد بيئة بايثون
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 📦 تثبيت المكتبات المطلوبة
        run: |
          python -m pip install --upgrade pip
          pip install pyTelegramBotAPI deep-translator

      - name: ⚡ تشغيل البوت تحت الإشراف
        run: python bot.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
