name: Visionary X Bot
on:
  schedule:
    - cron: '0 */2 * * *' # ينشر خبراً جديداً كل ساعتين
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: # إضافة صلاحيات الكتابة بشكل صريح داخل الملف
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install pyTelegramBotAPI feedparser beautifulsoup4

      - name: Run Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python bot.py

      - name: Save memory
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add published_urls.txt || echo "No changes to add"
          git commit -m "Update history [skip ci]" || echo "No changes to commit"
          git push
