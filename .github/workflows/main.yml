name: Run Global Engine Bot

on:
  push:
    branches: [ main, master ] # يعمل عند رفع كود جديد
  schedule:
    - cron: '0 */6 * * *' # مثال: يعمل كل 6 ساعات تلقائياً
  workflow_dispatch: # يتيح لك تشغيله يدوياً من واجهة GitHub

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # يمكنك تغيير الإصدار حسب حاجتك

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install deep-translator
          # إذا كان لديك مكتبات أخرى مثل pandas أو telebot أضفها هنا:
          # pip install pandas PyQRCode

      - name: Run Global Engine
        run: python bot.py
        env:
          # إذا كان البوت يحتاج لرموز سرية (Tokens)، أضفها في Secrets واكتبها هنا
          API_KEY: ${{ secrets.API_KEY }} 
