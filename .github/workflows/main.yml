name: Ultimate-Service-24-7

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: pip install pyTelegramBotAPI
      - name: Start Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }} # هذا السطر هو مفتاح الحل
        run: python bot.py
