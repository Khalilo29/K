name: Visionary X English Engine
on:
  schedule:
    - cron: '*/5 * * * *' # Fast Pulse: Every 5 Minutes 🚀
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install pyTelegramBotAPI feedparser beautifulsoup4
      - name: Run Global Engine
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python bot.py
      - name: Sync Memory
        run: |
          git config --global user.name "Visionary-AI-Global"
          git config --global user.email "ai@visionary.com"
          git add published_urls.txt || echo "No changes"
          git commit -m "Memory Sync [skip ci]" || echo "No changes"
          git push
