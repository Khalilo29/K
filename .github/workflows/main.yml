name: Visionary News Bot

on:
  schedule:
    # سيقوم النظام بتشغيل البوت كل ساعة (توقيت 0 دقيقة من كل ساعة)
    - cron: '0 * * * *'
  workflow_dispatch: # يتيح لك تشغيله يدوياً أيضاً للخدمة

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python bot.py
