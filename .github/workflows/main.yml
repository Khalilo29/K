name: Auto Post Bot

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/5 * * * *'  # ⏰ يعمل تلقائياً كل 5 دقائق
  workflow_dispatch:      # يسمح لك بتشغيله يدوياً للتجربة

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2  # تم تصحيح الكلمة هنا (بدون مسافة)
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install pyTelegramBotAPI

      - name: Run Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python bot.py
