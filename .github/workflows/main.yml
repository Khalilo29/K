name: run-bot-automatically

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 * * * *' # سأقوم بتشغيل البوت لك تلقائياً كل رأس ساعة
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyTelegramBotAPI deep-translator

      - name: Run Bot
        run: python bot.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
