name: Continuous-Bot-24-7

on:
  schedule:
    - cron: '0 */4 * * *' # سأقوم بإعادة تشغيل البوت لك كل 4 ساعات تلقائياً لضمان بقائه نشطاً
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-non-stop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Libraries
        run: |
          pip install pyTelegramBotAPI deep-translator

      - name: Run Global Engine
        run: python bot.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }} # تأكد أنك أضفت التوكن في Secrets بهذا الاسم
